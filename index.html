<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CONTROLE DE DADOS FINANÇAS 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: #F3F4F6;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading-msg" style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #666;">
        Carregando sistema... por favor aguarde.
      </div>
    </div>
    <script>
      window.process = window.process || {};
      window.process.env = window.process.env || {};
      try {
        let key = process.env.GEMINI_API_KEY;
        if (typeof key === 'string' && key !== "process.env.GEMINI_API_KEY") {
          window.process.env.GEMINI_API_KEY = key;
        }
      } catch (e) {}
      try {
        let key2 = process.env.API_KEY;
        if (typeof key2 === 'string' && key2 !== "process.env.API_KEY") {
          window.process.env.API_KEY = key2;
        }
      } catch (e) {}
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
